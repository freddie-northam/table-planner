<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table Planner</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="app-header">
  <div>
    <h1>Table Planner</h1>
    <p>Tables, guests, meals, and seating in one workspace.</p>
  </div>
  <div class="header-actions">
    <span class="capacity-text" id="capacityText">0 / 16 seats</span>
    <button class="table-icon-btn danger" id="clearAll" title="Clear all guests" aria-label="Clear all guests">
      <svg class="icon" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </button>
  </div>
</header>

<nav class="tab-bar glass" id="tabBar" aria-label="Planner sections">
  <button class="tab-btn active" data-tab="floor">Arrange</button>
  <button class="tab-btn" data-tab="guests">Guests</button>
  <button class="tab-btn" data-tab="setup">Setup</button>
</nav>

<div class="warning-banner" id="warning">
  <svg class="icon" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01"/></svg>
  <span id="warningText"></span>
</div>

<main class="app-main">
  <section class="tab-panel active" data-panel="floor" id="floorPanel">
    <div class="floor-workspace">
      <aside class="plan-rail glass" id="planRail" aria-label="Plan status"></aside>

      <div class="floor-canvas-column">
        <div class="floor-toolbar glass">
          <div>
            <span class="eyebrow">Arrange</span>
            <h2>Floor Plan</h2>
          </div>
          <button class="btn-shuffle" id="shuffleBtn" disabled>
            <svg class="icon" viewBox="0 0 24 24"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
            Shuffle
          </button>
        </div>
        <div class="tables-boundary">
          <div class="tables-grid" id="tablesGrid"></div>
          <div class="zero-state" id="zeroState"></div>
          <div class="move-hint" id="moveHint"></div>
        </div>
      </div>

      <aside class="table-inspector glass" id="tableInspector" aria-label="Selection details"></aside>
    </div>
  </section>

  <section class="tab-panel" data-panel="guests" id="guestPanel">
    <div class="panel glass guest-panel">
      <div class="section-header">
        <div>
          <h2>Guest List</h2>
          <p id="guestCount">0 guests</p>
        </div>
        <form class="add-form" id="addForm">
          <input type="text" id="nameInput" placeholder="Guest name" autocomplete="off">
          <button type="button" class="gender-toggle" id="genderToggle" title="Click to toggle M/F">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="10" cy="14" r="7"/><path d="M21 3l-5.2 5.2M21 3h-5M21 3v5"/></svg>
          </button>
          <button type="submit" class="btn-icon" title="Add guest" aria-label="Add guest">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </form>
      </div>

      <label class="search-field">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg>
        <input type="search" id="guestSearch" placeholder="Search guests">
      </label>

      <div class="guest-filter-bar" id="guestFilterBar" aria-label="Guest filters"></div>

      <div class="data-table-wrap">
        <table class="guest-data-table" id="guestTable">
          <thead>
            <tr>
              <th><button data-sort="name" data-label="Name">Name</button></th>
              <th><button data-sort="table" data-label="Table">Table</button></th>
              <th><button data-sort="vip" data-label="VIP">VIP</button></th>
              <th><button data-sort="rsvp" data-label="RSVP">RSVP</button></th>
              <th><button data-sort="meal" data-label="Meal">Meal</button></th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="guestTableBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <section class="tab-panel" data-panel="setup" id="setupPanel">
    <div class="setup-grid">
      <div class="panel glass setup-panel">
        <div class="section-header">
          <div>
            <h2>Tables</h2>
            <p>Table configuration</p>
          </div>
          <button class="btn-secondary" id="addTableBtn">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            Add Table
          </button>
        </div>
        <div class="setup-tables" id="setupTables"></div>
      </div>

      <div class="panel glass meal-panel">
        <div class="section-header">
          <div>
            <h2>Meal Options</h2>
            <p>Guest meal choices</p>
          </div>
        </div>
        <div class="meal-options-list" id="mealOptionsList"></div>
        <form class="meal-option-form" id="mealOptionForm">
          <input type="text" id="mealOptionInput" placeholder="Add meal option" autocomplete="off">
          <button type="submit" class="btn-icon" title="Add meal option" aria-label="Add meal option">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </form>
      </div>
    </div>
  </section>
</main>

<script type="module" src="js/app.js"></script>
</body>
</html>
